<!DOCTYPE html>
<html>

<head>
  <title>Overseer Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: #e5e7eb;
    }

    header {
      padding: 18px 20px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 16px;
    }

    .status {
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      margin-left: 8px;
      color: white;
      text-transform: capitalize;
    }

    .green { background: #16a34a; }
    .red { background: #dc2626; }
    .yellow { background: #ca8a04; }
    .gray { background: #374151; }

    .meta {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
      line-height: 1.5;
    }

    .ports a {
      display: inline-block;
      margin: 4px 6px 0 0;
      padding: 4px 8px;
      border-radius: 6px;
      background: #1f2937;
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }

    .ports a:hover {
      background: #374151;
    }

    .protocol {
      font-size: 10px;
      margin-left: 4px;
      color: #9ca3af;
    }

    button {
      margin-top: 10px;
      margin-right: 5px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      color: white;
    }

    .start { background: #16a34a; }
    .stop { background: #dc2626; }
    .restart { background: #2563eb; }
  </style>
</head>

<body>

<header>
  <div>🧠 Overseer Dashboard</div>
</header>

<div class="container" id="grid"></div>


<footer style="text-align:center; padding:14px; font-size:11px; color:#6b7280; border-top:1px solid #1f2937; margin-top:20px;">
  © 2026 PyKhaled. All rights reserved.
  <br/>
  Built for internal infrastructure management •

  <a href="mailto:ahmedaka@icloud.com" style="color:#60a5fa; text-decoration:none;">Contact</a>
</footer>





<script>
  function statusClass(s) {
    s = (s || "").toLowerCase();
    if (s === "running") return "green";
    if (s === "exited") return "red";
    if (s === "restarting") return "yellow";
    return "gray";
  }

  async function action(type, id) {
    await fetch(`/api/service/${id}/${type}`, { method: "POST" });
    await load();
  }

  // 🔥 FIXED: safe URL builder (prevents broken href)
  function buildUrl(protocol, host, port) {
    if (!host || !port) return null;
    return `${protocol}://${host}:${port}`;
  }

  // 🔥 FIXED: clickable ports using window.open fallback
  function renderPorts(ports) {
    if (!ports) return `<span style="color:#6b7280">No ports exposed</span>`;

    let html = "";
    const seen = new Set();

    // CASE 1: normalized backend format
    if (Array.isArray(ports)) {
      ports.forEach(p => {
        if (!p || !p.url) return;
        if (seen.has(p.url)) return;
        seen.add(p.url);

        html += `
          <a onclick="openPort('${p.url}')">
            ${p.container_port || p.port || "port"}
            <span class="protocol">(${(p.protocol || "http").toUpperCase()})</span>
          </a>
        `;
      });

      return html || `<span style="color:#6b7280">No ports exposed</span>`;
    }

    // CASE 2: raw Docker format
    if (typeof ports === "object") {
      Object.entries(ports).forEach(([containerPort, mappings]) => {
        if (!Array.isArray(mappings)) return;

        mappings.forEach(m => {
          const host = (m.HostIp === "0.0.0.0" || m.HostIp === "::")
            ? "localhost"
            : m.HostIp;

          const port = m.HostPort;

          if (!host || !port) return;

          const protocol = containerPort.includes("443") ? "https" : "http";
          const url = buildUrl(protocol, host, port);

          if (!url || seen.has(url)) return;
          seen.add(url);

          html += `
            <a onclick="openPort('${url}')">
              ${containerPort}
              <span class="protocol">(${protocol.toUpperCase()})</span>
            </a>
          `;
        });
      });

      return html || `<span style="color:#6b7280">No ports exposed</span>`;
    }

    return `<span style="color:#6b7280">No ports exposed</span>`;
  }

  // 🔥 FIXED: robust navigation (avoids broken href issues)
  function openPort(url) {
    if (!url) return;
    window.open(url, "_blank");
  }

  async function load() {
    const res = await fetch("/api/services");
    const data = await res.json();

    document.getElementById("grid").innerHTML = data.map(s => `
      <div class="card">
        <div>
          <b>${s.name}</b>
          <span class="status ${statusClass(s.status)}">${s.status}</span>
        </div>

        <div class="meta">
          <div>Container: ${s.id}</div>
          <div>Image: ${s.image?.[0] || ""}</div>

          <div class="ports">
            <b>Ports:</b><br/>
            ${renderPorts(s.ports)}
          </div>

          <div>Started: ${s.started_at}</div>
          <div>Uptime: ${s.uptime}</div>
        </div>

        <button class="restart" onclick="action('restart','${s.id}')">Restart</button>
        <button class="stop" onclick="action('stop','${s.id}')">Stop</button>
        <button class="start" onclick="action('start','${s.id}')">Start</button>
      </div>
    `).join("");
  }

  load();
  setInterval(load, 5000);
</script>

</body>
</html>
